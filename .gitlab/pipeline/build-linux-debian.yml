.debian_test_base:
  stage: plateform-build-test
  variables:
    OS_VERSION: "--"
    PACKAGE: "--"
    C_COMPILER: "--"
    CXX_COMPILER: "--"
  image: debian:${OS_VERSION}
  rules:
    # on default branch
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
  script:
    - apt-get update -qq
    - apt-get install --yes sudo wget ${PACKAGE}
    - ./ci/debian/before_install.sh $CGAL_VERSION
    - cd $CI_PROJECT_DIR
    - cmake -DSFCGAL_WITH_EIGEN=${EIGEN} -DSFCGAL_BUILD_TESTS=ON -DSFCGAL_BUILD_CLI=ON -DCMAKE_C_COMPILER=/usr/bin/${C_COMPILER} -DCMAKE_CXX_COMPILER=/usr/bin/${CXX_COMPILER} -DCGAL_DIR=${CI_PROJECT_DIR}/CGAL-${CGAL_VERSION}
    - make -j$(nproc)
    - ctest -VV
  parallel:
    matrix:
      - CGAL_VERSION: [$CGAL_5_VERSION, $CGAL_6_1_VERSION, $CGAL_6_2_VERSION]
        OS_VERSION: ["stable", "testing"]
        EIGEN: ["OFF", "ON"]

debian_clang:
  extends: .debian_test_base
  variables:
    PACKAGE: "clang"
    C_COMPILER: "clang"
    CXX_COMPILER: "clang++"

debian_gcc:
  extends: .debian_test_base
  variables:
    PACKAGE: "build-essential"
    C_COMPILER: "gcc"
    CXX_COMPILER: "g++"

debian_gcc_auto:
  extends: .debian_test_base
  variables:
    PACKAGE: "build-essential"
    C_COMPILER: "gcc"
    CXX_COMPILER: "g++"
  rules:
    # on default branch
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - "**/*.{c,h,cpp,hpp}"
        - "ci/**/*"
        - ".gitlab/**/*"
      when: always
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "**/*.{c,h,cpp,hpp}"
        - "ci/**/*"
        - ".gitlab/**/*"
      when: always
  parallel:
    matrix:
      - CGAL_VERSION: [$CGAL_LATEST_VERSION]
        OS_VERSION: ["testing"]

debian_test_32bits:
  stage: plateform-build-test
  image: debian:unstable
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
  script:
    - dpkg --add-architecture i386
    - apt update -qq
    - apt install --yes wget gcc-multilib g++-multilib cmake xz-utils
    - apt install --yes libboost-program-options-dev:i386 libboost-test-dev:i386 libboost-thread-dev:i386 nlohmann-json3-dev:i386 libboost-serialization-dev:i386 libmpfr-dev:i386 libgmp-dev:i386 libeigen3-dev:i386
    - wget --tries=10 --waitretry=5 --timeout=90 --read-timeout=90 https://github.com/CGAL/cgal/releases/download/v6.2/CGAL-6.2.tar.xz && tar xJf CGAL-6.2.tar.xz && cd CGAL-6.2 && mkdir build && cd build && cmake -DCMAKE_C_FLAGS="-m32" -DCMAKE_CXX_FLAGS="-m32" -DCMAKE_INSTALL_PREFIX="$CI_PROJECT_DIR/CGAL" .. && make && make install
    - cd $CI_PROJECT_DIR
    - cmake
        -DSFCGAL_WITH_EIGEN=ON
        -DSFCGAL_BUILD_TESTS=ON
        -DSFCGAL_BUILD_CLI=ON
        -DCMAKE_C_COMPILER=/usr/bin/gcc
        -DCMAKE_CXX_COMPILER=/usr/bin/g++
        -DCGAL_DIR=${CI_PROJECT_DIR}/CGAL-6.2
        -DCMAKE_C_FLAGS="-m32"
        -DCMAKE_CXX_FLAGS="-m32"
        -DCMAKE_EXE_LINKER_FLAGS="-m32"
        -DCMAKE_SHARED_LINKER_FLAGS="-m32"
    - make -j$(nproc)
    - ctest -VV
