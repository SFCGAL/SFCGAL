build:macos_clang:
  stage: plateform-build-test
  tags:
    - saas-macos-large-m2pro
  image: macos-15-xcode-16
  variables:
    HOMEBREW_NO_AUTO_UPDATE: 1
    HOMEBREW_NO_INSTALL_UPGRADE: 1
    HOMEBREW_NO_INSTALL_CLEANUP: 1
    HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: 1
  dependencies: []
  rules:
    # on default branch
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always
    # on a tag
    - if: $CI_COMMIT_TAG
      when: always
    # on a MR if previous jobs are successful
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
      when: manual
  before_script:
    - brew install boost cgal cmake gmp mpfr ninja nlohmann-json eigen
  script:
    - cmake -GNinja -S . -B build -DSFCGAL_WITH_EIGEN=ON -DSFCGAL_BUILD_TESTS=ON -DSFCGAL_BUILD_CLI=ON
    - cmake --build build
    - ctest --test-dir build -VV
    - mkdir -p ${CI_PROJECT_DIR}/install
    - cmake --install build --prefix ${CI_PROJECT_DIR}/install
  artifacts:
    paths:
      - install/

homebrew:generate:
  stage: package-build
  image: debian:stable
  needs:
    - job: build:macos_clang
      artifacts: true
  variables:
    SFCGAL_VERSION: "2.3.1"
  rules:
    # on default branch
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always
      variables:
        PACKAGE_VERSION: "latest"
    # on a tag
    - if: $CI_COMMIT_TAG
      when: always
      variables:
        PACKAGE_VERSION: "${CI_COMMIT_TAG#v}"
    # on a MR if previous jobs are successful
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
      when: manual
      variables:
        PACKAGE_VERSION: "latest"
  script:
    - .gitlab/generate-homebrew.sh ${CI_PROJECT_DIR}/install ${SFCGAL_VERSION} ${PACKAGE_VERSION}
  artifacts:
    paths:
      - sfcgal-*.tar.gz
      - sfcgal-*.rb

homebrew:publish:
  stage: package-push
  image: debian:stable
  needs:
    - job: homebrew:generate
      artifacts: true
  rules:
    - if: $CI_COMMIT_TAG
      when: always
      variables:
        PACKAGE_VERSION: "${CI_COMMIT_TAG#v}"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always
      variables:
        PACKAGE_VERSION: "latest"
  before_script:
    - apt update && apt install --no-install-recommends --yes ca-certificates curl
  script:
    - |
      for file in *.rb *.tar.gz; do
        [ -f "$file" ] || continue
        curl --fail-with-body \
          --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          --upload-file "${file}" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/homebrew/${PACKAGE_VERSION}/$(basename "${file}")"
      done
