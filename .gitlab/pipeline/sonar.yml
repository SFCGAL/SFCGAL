# SonarCloud
image: debian:stable

variables:
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar" # Defines the location of the analysis task cache
  GIT_DEPTH: "0" # Tells git to fetch all the branches of the project, required by the analysis task
  SONAR_SCANNER_VERSION: 8.0.1.6346-linux-x64

sonar:get-binaries:
  stage: sonar-build-test
  cache:
    policy: push
    key: "${CI_COMMIT_SHORT_SHA}"
    paths:
      - build-wrapper/
      - sonar-scanner/
  before_script:
    - apt-get update -qq
    - apt-get install --yes sudo curl wget build-essential unzip
  script:
    # Download sonar-scanner
    - curl -sSLo ./sonar-scanner.zip "https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-${SONAR_SCANNER_VERSION}.zip"
    - unzip -o sonar-scanner.zip
    - mv sonar-scanner-${SONAR_SCANNER_VERSION} sonar-scanner
    # Download build-wrapper
    - curl -sSLo ./build-wrapper-linux-x86.zip "${SONAR_HOST_URL}/static/cpp/build-wrapper-linux-x86.zip"
    - unzip -oj build-wrapper-linux-x86.zip -d ./build-wrapper
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always
    # on default branch
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always

sonar:build-test:
  stage: sonar-build-test
  needs: ["sonar:get-binaries"]
  before_script:
    - apt-get update -qq
    - apt-get install --yes sudo wget build-essential gcovr python3
    - ./ci/debian/before_install.sh $SONAR_CGAL_VERSION
  script:
    # prepare the build tree
    - CGAL_DIR=$CI_PROJECT_DIR/CGAL cmake -S . -B build -DSFCGAL_COVERAGE=ON -DSFCGAL_BUILD_TESTS=ON -DSFCGAL_BUILD_EXAMPLES=ON -DCMAKE_C_COMPILER=/usr/bin/gcc -DCMAKE_CXX_COMPILER=/usr/bin/g++ -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
    # run the build inside the build wrapper
    - build-wrapper/build-wrapper-linux-x86-64 --out-dir bw-output cmake --build build/ --config Release
    - mkdir -p reports/unit && mkdir -p reports/coverage
    - cd build
    # run unit tests in parallel and generate boost reports
    - >
      test/unit/unit-test-SFCGAL --list_content 2>&1
      | egrep -v '^ '
      | sed 's/\*//g'
      | xargs -P$(nproc) -I {} test/unit/unit-test-SFCGAL --report_format=XML --report_level=detailed --report_sink=boost_report_{}.xml -t {}
    # run other test and generate boost report
    - >
      for f in $(find test/ -type f -perm u=rwx,g=rwx,o=rx | grep -v unit); do
        $f --report_format=XML --report_level=detailed --report_sink=boost_report_$(basename $f).xml;
      done
    # merge all boost reports to one cpp unit one
    - python ../script/merge_boost_reports_to_cppunit.py boost_report_*.xml
    - mv merged_report.xml ../reports/unit/
    # generate coverage report
    - >
      gcovr --xml-pretty --exclude-unreachable-branches --exclude-throw-branches --print-summary
      -o ../reports/coverage/coverage.xml
      --sonarqube=../reports/coverage/coverage_sonarqube.xml
      --root ..
      -e "\.\./test/"
    # run sonar scanner
    - cd ..
    - >
      sonar-scanner/bin/sonar-scanner
      -Dsonar.cfamily.compile-commands=bw-output/compile_commands.json
      -Dsonar.cfamily.cppunit.reportsPath=reports/unit/ -Dsonar.coverageReportPaths=reports/coverage/coverage_sonarqube.xml
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always
      allow_failure: true
    # on default branch
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always
      allow_failure: true
  artifacts:
    paths:
      - reports/
