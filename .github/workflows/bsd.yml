name: BSD

on: [push, pull_request]

jobs:
  test-bsd:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os:
          - { name: freebsd, version: '14.3' }
          - { name: netbsd, version: '10.1' }
          - { name: openbsd, version: '7.8' }
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies and build on ${{ matrix.os.name }} ${{ matrix.os.version }}
        uses: cross-platform-actions/action@master
        with:
          operating_system: ${{ matrix.os.name }}
          version: ${{ matrix.os.version }}
          shell: bash
          run: |
            uname -a
            echo `sysctl -n hw.ncpu`
            case "${{ matrix.os.name }}" in
              freebsd)
                ASSUME_ALWAYS_YES=yes sudo pkg install -y gmp mpfr boost-libs cmake ninja curl nlohmann-json math/eigen3
                ;;
              netbsd)
                sudo pkgin -y update
                sudo pkgin -y install gmp mpfr boost cmake ninja-build curl nlohmann-json eigen3                ;;
              openbsd)
                sudo pkg_add gmp gmpxx mpfr boost cmake ninja curl nlohmann-json math/eigen3
                ;;
            esac

            export CGAL_VERSION=6.2
            curl -L -o CGAL-${CGAL_VERSION}.tar.gz "https://github.com/CGAL/cgal/archive/refs/tags/v${CGAL_VERSION}.tar.gz"
            tar xzf CGAL-${CGAL_VERSION}.tar.gz
            # From https://github.com/CGAL/cgal/pull/9526
            curl -L -o bsd_minor.patch https://github.com/CGAL/cgal/commit/827548a844fef7060f3f6f7eefe5f3fff7e516bd.patch
            cd cgal-${CGAL_VERSION}
            patch -p1 < ../bsd_minor.patch
            cd ..

            cmake -GNinja -S . -B build -DSFCGAL_WITH_EIGEN=ON -DSFCGAL_BUILD_TESTS=ON -DCGAL_DIR=cgal-${CGAL_VERSION} -DCMAKE_CXX_FLAGS="-DCGAL_NO_GDB_AUTOLOAD"
            cmake --build build -j `sysctl -n hw.ncpu`
            ctest -VV --test-dir build

  test-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew update
          brew install boost cgal gmp mpfr nlohmann-json

      - name: Build
        run: |
          cmake -DSFCGAL_BUILD_TESTS=ON -S . -B build
          cmake --build build
          ctest -VV --test-dir build
